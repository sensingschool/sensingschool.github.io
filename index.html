<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sensing School</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;900&display=swap" rel="stylesheet" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XTHNL4559K"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-XTHNL4559K');
    </script>
    <style>
      :root {
        --red: #bc122a;
        --black: #111;
        --gold: #E8B923;
        --grey-line: #dee2e6;
        --grey-text: #5b6068;
        --wordmark: clamp(44px, 9vw, 86px);
      }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: 'Roboto', Helvetica, Arial, sans-serif;
        background: #fafafa;
        color: var(--black);
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 0 24px 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .lockup {
        display: flex;
        align-items: center;
        gap: clamp(20px, 4vw, 36px);
        padding: 96px 0 56px;
        max-width: 100%;
        box-sizing: border-box;
      }
      .links {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 20px;
        width: 100%;
      }
      .card-link {
        display: flex;
        flex-direction: column;
        background: #fff;
        border: 1px solid var(--grey-line);
        border-radius: 12px;
        color: var(--black);
        text-decoration: none;
        transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
        position: relative;
        overflow: hidden;
      }
      .card-link:hover {
        border-color: var(--red);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      }
      .card-link .cover {
        aspect-ratio: 16 / 9;
        background: #0c0c0e;
        display: block;
        overflow: hidden;
      }
      .card-link .cover svg { display: block; width: 100%; height: 100%; }
      .card-link .body {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 24px 28px 22px;
        flex: 1;
      }
      .card-link h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.3px;
      }
      .card-link p {
        margin: 0;
        color: var(--grey-text);
        font-size: 14px;
        line-height: 1.5;
        flex: 1 0 auto;
      }
      .card-link .arrow {
        margin-top: 12px;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--red);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .card-link .arrow::after {
        content: '\2192';
        transition: transform 0.15s;
      }
      .card-link:hover .arrow::after { transform: translateX(3px); }
      .attribution {
        margin-top: 48px;
        padding-top: 24px;
        border-top: 1px solid var(--grey-line);
        width: 100%;
        font-size: 13px;
        letter-spacing: 0.5px;
        color: var(--grey-text);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .attribution a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--black);
        text-decoration: none;
        font-weight: 700;
        transition: color 0.15s, opacity 0.15s;
      }
      .attribution a img {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        display: block;
      }
      .attribution a:hover { color: var(--red); }
      .attribution a:hover img { opacity: 0.85; }
      .bullseye {
        width: clamp(96px, 18vw, 180px);
        height: auto;
        flex: 0 0 auto;
      }
      .wordmark {
        min-width: 0;
      }
      .row {
        font-weight: 900;
        font-size: var(--wordmark);
        line-height: 0.95;
        letter-spacing: -1px;
      }
      .row.sensing {
        position: relative;
        display: inline-block;
        color: var(--black);
      }
      .row.school {
        color: var(--red);
        margin-top: 6px;
      }
      .cap {
        position: absolute;
        top:   calc(var(--wordmark) * -0.78);
        right: calc(var(--wordmark) * -0.75);
        width: calc(var(--wordmark) * 1.51);
        height: auto;
        overflow: visible;
        transform: rotate(12deg);
        transform-origin: 50% 19.5%;
        pointer-events: none;
      }
      .divider {
        height: 1px;
        background: var(--grey-line);
        margin: 18px 0 10px;
      }
      .institution {
        font-weight: 400;
        font-size: clamp(12px, 1.4vw, 18px);
        letter-spacing: 2px;
        color: var(--grey-text);
        text-transform: uppercase;
      }
      @media (max-width: 640px) {
        .lockup { flex-direction: column; align-items: flex-start; padding: 32px 20px; }
        .institution { letter-spacing: 1.5px; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="lockup" aria-label="Sensing School">
      <svg class="bullseye" viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="46" fill="none" stroke="#bc122a" stroke-width="2" opacity="0.55"/>
        <circle cx="50" cy="50" r="36" fill="none" stroke="#bc122a" stroke-width="2.5" opacity="0.7"/>
        <circle cx="50" cy="50" r="26" fill="none" stroke="#bc122a" stroke-width="3"/>
        <circle cx="50" cy="50" r="14" fill="none" stroke="#bc122a" stroke-width="3.5"/>
        <circle cx="50" cy="50" r="6"  fill="#bc122a"/>
      </svg>
      <div class="wordmark">
        <div class="row sensing">
          <span>SENSING</span>
          <svg class="cap" viewBox="0 0 100 154" aria-hidden="true">
            <path d="M 24 20 L 76 20 L 70 56 Q 50 64 30 56 Z" fill="#111"/>
            <path d="M 50 2 L 98 20 L 50 38 L 2 20 Z" fill="#111"/>
            <path d="M 50 38 L 98 20 L 96 21.6 L 50 39.6 Z" fill="#000" opacity="0.18"/>
            <path d="M 24 20 L 76 20 L 75 24 L 25 24 Z" fill="#000" opacity="0.18"/>
            <circle cx="50" cy="20" r="2.6" fill="#E8B923"/>
            <path d="M 50 20 C 75 20, 92 22, 97 28 C 99 36, 96 55, 95 100"
                  fill="none" stroke="#E8B923" stroke-width="3" stroke-linecap="round"/>
            <g transform="translate(95 100)">
              <circle cx="0" cy="-1" r="3.4" fill="#E8B923"/>
              <line x1="-3" y1="0" x2="-5" y2="13" stroke="#E8B923" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="-1" y1="1" x2="-2" y2="14" stroke="#E8B923" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="1"  y1="1" x2="2"  y2="14" stroke="#E8B923" stroke-width="2.4" stroke-linecap="round"/>
              <line x1="3"  y1="0" x2="5"  y2="13" stroke="#E8B923" stroke-width="2.4" stroke-linecap="round"/>
            </g>
          </svg>
        </div>
        <div class="row school">SCHOOL</div>
        <div class="divider"></div>
        <div class="institution">Carnegie Mellon University</div>
      </div>
      </div>
      <section class="links" aria-label="Tools">
        <a class="card-link" href="tone/">
          <div class="cover" aria-hidden="true">
            <svg viewBox="0 0 200 100" preserveAspectRatio="none">
              <g stroke="rgba(255,255,255,0.08)" stroke-width="0.5">
                <line x1="40"  y1="0" x2="40"  y2="100"/>
                <line x1="80"  y1="0" x2="80"  y2="100"/>
                <line x1="120" y1="0" x2="120" y2="100"/>
                <line x1="160" y1="0" x2="160" y2="100"/>
              </g>
              <path d="M 0 96 L 20 94 L 40 92 L 60 90 L 75 88 L 88 78 L 94 32 L 100 8 L 106 32 L 112 78 L 125 88 L 140 92 L 160 94 L 180 95 L 200 96 L 200 100 L 0 100 Z"
                    fill="rgba(188,18,42,0.28)"/>
              <path d="M 0 96 L 20 94 L 40 92 L 60 90 L 75 88 L 88 78 L 94 32 L 100 8 L 106 32 L 112 78 L 125 88 L 140 92 L 160 94 L 180 95 L 200 96"
                    fill="none" stroke="#bc122a" stroke-width="1.4" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="body">
            <h2>Tone &amp; Spectrum</h2>
            <p>Generate a sine tone through your speakers and watch the live FFT of what your microphone hears.</p>
            <span class="arrow">Open</span>
          </div>
        </a>
      </section>
      <footer class="attribution">
        Created by
        <a href="https://semanticsignals.com" target="_blank" rel="noopener">
          <img src="semanticsignals-logo.png" alt="" />
          <span>Semantic Signals</span>
        </a>
      </footer>
    </main>
  </body>
</html>
